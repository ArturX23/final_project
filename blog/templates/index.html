{% extends "base.html" %}

{% block title %}Mój blog{% endblock %}

{% block content %}

<h1 class="mb-4">Wszystkie wpisy</h1>

{% for post in posts %}
<div class="card mb-4">
    <div class="card-body">

        <h2 class="card-title">{{ post.title }}</h2>

        <p class="card-text">
            {{ post.body }}
        </p>

        <div class="mt-3">
            <a href="#" class="btn btn-primary">Czytaj więcej</a>

            <a href="{{ url_for('manage_entry', entry_id=post.id) }}"
               class="btn btn-warning">
               Edytuj
            </a>
        </div>

    </div>
</div>
{% else %}
<p>Brak wpisów do wyświetlenia.</p>
{% endfor %}

{% endblock %}
